apiVersion: apps/v1
kind: Deployment
metadata:
  name: cashctrl-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cashctrl-web
  template:
    metadata:
      labels:
        app: cashctrl-web
    spec:
      containers:
      - name: web
        image: cashctrl-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: cashctrl-config
        - secretRef:
            name: cashctrl-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: cashctrl-web
spec:
  selector:
    app: cashctrl-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
