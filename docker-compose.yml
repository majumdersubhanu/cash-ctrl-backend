services:

  db:
    image: postgres:16
    container_name: cashctrl_db
    restart: no
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cashctrl_user -d cashctrl" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cashctrl_redis
    restart: no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    image: cash-ctrl-backend-web
    container_name: cashctrl_web
    restart: no
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-tmp-dir /dev/shm
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery_worker:
    image: cash-ctrl-backend-web
    container_name: cashctrl_celery_worker
    restart: no
    command: celery -A app worker -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    image: cash-ctrl-backend-web
    container_name: cashctrl_celery_beat
    restart: no
    command: celery -A app beat -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: cashctrl_nginx
    restart: no
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

  flower:
    image: cash-ctrl-backend-web
    container_name: cashctrl_flower
    command: celery -A app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: cashctrl_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - web

  grafana:
    image: grafana/grafana:latest
    container_name: cashctrl_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  static_volume:
  media_volume:
  grafana_data:
