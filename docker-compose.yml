services:

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cashctrl
      POSTGRES_USER: cashctrl_user
      POSTGRES_PASSWORD: cashctrl_pass
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cashctrl_user -d cashctrl" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DEBUG: "0"
      DATABASE_URL: postgres://cashctrl_user:cashctrl_pass@db:5432/cashctrl
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: prod-secret-key-replace-me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A app worker -l info
    environment:
      DEBUG: "0"
      DATABASE_URL: postgres://cashctrl_user:cashctrl_pass@db:5432/cashctrl
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: prod-secret-key-replace-me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A app beat -l info
    environment:
      DEBUG: "0"
      DATABASE_URL: postgres://cashctrl_user:cashctrl_pass@db:5432/cashctrl
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: prod-secret-key-replace-me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
