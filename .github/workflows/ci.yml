name: CashCtrl CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  # CI-only ephemeral credentials (destroyed after each run)
  CI_DB_USER: cashctrl_user
  CI_DB_PASS: ci_test_password_42
  CI_DB_NAME: cashctrl_db

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_DB_PASS }}
          POSTGRES_DB: ${{ env.CI_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install UV and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-test.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run Pytest Test Suite
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DATABASE_URL: postgres://${{ env.CI_DB_USER }}:${{ env.CI_DB_PASS }}@localhost:5432/${{ env.CI_DB_NAME }}
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-ephemeral-secret-key-not-for-production' }}
          SECURE_SSL_REDIRECT: "False"
          SESSION_COOKIE_SECURE: "False"
          CSRF_COOKIE_SECURE: "False"
        run: uv run pytest --cov=. --cov-report=xml

  docker-build:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t cashctrl-backend:latest -f Dockerfile .
